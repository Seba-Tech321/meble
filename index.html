<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklep Meblowy - Inspiracja MIZUMI</title>
    <!-- Ładowanie darmowej biblioteki Supabase do obsługi bazy w chmurze -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --dark: #121212; --light: #fcfcfc; --gray: #bcbcbc; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        header { padding: 30px; text-align: center; border-bottom: 1px solid #eee; background: #fff; position: relative; }
        .nav-btn { position: absolute; left: 30px; top: 35px; background: none; border: 1px solid var(--dark); padding: 8px 16px; cursor: pointer; display: none; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .admin-toggle { position: absolute; right: 30px; top: 35px; background: none; border: 1px dashed red; padding: 8px 16px; cursor: pointer; font-size: 11px; text-transform: uppercase; color: red; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* Styl panelu zarządzania meblami */
        .admin-panel { background: #fff; padding: 25px; border: 1px solid #121212; margin-bottom: 40px; display: none; }
        .admin-panel h3 { margin-top: 0; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #eee; font-size: 13px; background: #f9f9f9; }
        input:focus { outline: 1px solid var(--dark); background: #fff; }
        button.action { background: var(--dark); color: #fff; border: none; padding: 12px 25px; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1.5px; }
        
        /* Siatki i Kafelki w stylu MIZUMI */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; }
        .card { background: #fff; cursor: pointer; overflow: hidden; transition: transform 0.4s ease; position: relative; min-height: 400px; display: flex; flex-direction: column; justify-content: flex-end; }
        .card:hover { transform: translateY(-5px); }
        .card-img { position: absolute; top:0; left:0; width:100%; height:100%; background: #eaeaea; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: #999; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .card-info { position: relative; z-index: 2; background: rgba(255,255,255,0.95); padding: 25px; border-top: 1px solid #f5f5f5; text-align: left; }
        .card-info h3 { margin: 0 0 5px 0; font-size: 15px; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }
        .card-info .price { font-size: 14px; color: #666; font-weight: bold; }

        /* Karta pojedynczego mebla */
        .product-detail { display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; background: #fff; padding: 40px; }
        .gallery-container { display: flex; flex-direction: column; gap: 20px; }
        .main-image { height: 550px; background: #eaeaea; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: #999; text-transform: uppercase; font-size: 12px; }
        .thumbs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .thumb { height: 90px; background: #eaeaea; background-size: cover; background-position: center; cursor: pointer; border: 1px solid transparent; }
        .thumb:hover { border-color: var(--dark); }
        .product-meta { display: flex; flex-direction: column; justify-content: center; padding-left: 20px; }
        .product-meta h1 { font-size: 28px; font-weight: 300; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; }
        .product-meta .detail-price { font-size: 20px; margin-bottom: 40px; font-weight: bold; color: #333; }
        .buy-btn { background: var(--dark); color: white; border: none; padding: 18px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: background 0.3s; }
        .buy-btn:hover { background: #333; }
        
        .view { display: none; }
        .view.active { display: block; }
        .empty-msg { text-align: center; color: #888; grid-column: 1/-1; padding: 40px 0; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <button id="backBtn" class="nav-btn" onclick="goBack()">&larr; Wróć</button>
        <h1 id="mainTitle" style="font-weight: 300; letter-spacing: 3px; font-size: 22px;">MIZUMI STYLE</h1>
        <button class="admin-toggle" onclick="toggleAdmin()">Tryb Edycji (Klienta)</button>
    </header>

    <div class="container">
        
        <!-- PANEL DLA KLIENTA DO SAMODZIELNEGO DODAWANIA -->
        <div id="adminPanel" class="admin-panel">
            <div id="categoryForm">
                <h3>+ Utwórz nowy główny przycisk (Kategorię mebli)</h3>
                <div class="form-row">
                    <input type="text" id="catName" placeholder="Nazwa strefy (np. Sypialnia)">
                    <input type="text" id="catImg" placeholder="Link do zdjęcia tła (URL)">
                </div>
                <button class="action" onclick="addCategory()">Zapisz Kategorię w Chmurze</button>
            </div>

            <div id="productForm" style="display: none;">
                <h3>+ Dodaj nowy mebel do aktywnej strefy</h3>
                <div class="form-row">
                    <input type="text" id="prodName" placeholder="Nazwa mebla (np. Łóżko dębowe)">
                    <input type="text" id="prodPrice" placeholder="Cena (np. 3499 zł)">
                </div>
                <div class="form-row">
                    <input type="text" id="prodImg" placeholder="Link do zdjęcia głównego (URL)">
                    <input type="text" id="prodGallery" placeholder="Linki do dodatkowych zdjęć (rozdziel przecinkami)">
                </div>
                <button class="action" onclick="addProduct()">Zapisz Mebel w Chmurze</button>
            </div>
        </div>

        <!-- WIDOK 1: STRONA GŁÓWNA -->
        <div id="viewHome" class="view active">
            <div id="categoriesGrid" class="grid"></div>
        </div>

        <!-- WIDOK 2: PRODUKTY W KATEGORII -->
        <div id="viewCategory" class="view">
            <div id="productsGrid" class="grid"></div>
        </div>

        <!-- WIDOK 3: KARTA MEBLA -->
        <div id="viewProduct" class="view">
            <div class="product-detail">
                <div class="gallery-container">
                    <div id="detailMainImg" class="main-image">Brak zdjęcia</div>
                    <div id="detailThumbs" class="thumbs-grid"></div>
                </div>
                <div class="product-meta">
                    <h1 id="detailTitle">Nazwa Mebla</h1>
                    <div id="detailPrice" class="detail-price">0.00 zł</div>
                    <button class="buy-btn" onclick="alert('System koszyka: Zamówienie zostało wysłane.')">Kup teraz</button>
                </div>
            </div>
        </div>

    </div>
    <script>
        const SUPABASE_URL = 'https://supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsa3JveHBweXNsbHdrd2tveXNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzE1MDgsImV4cCI6MjA5NzM0NzUwOH0.HkkkGqju8Pg-TfVuDN5M0QWsUJ-zRxiIpXoDDfOoM5E';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentView = 'home'; 
        let currentCategoryId = null;

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        async function loadData() {
            if(currentView === 'home') {
                const { data, error } = await supabase.from('categories').select('*');
                const grid = document.getElementById('categoriesGrid');
                grid.innerHTML = '';
                if(!data || data.length === 0) {
                    grid.innerHTML = '<div class="empty-msg">Pusta strona. Włącz "Tryb edycji" u góry i utwórz pierwszą kategorię.</div>';
                    return;
                }
                data.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openCategory(cat);
                    let bg = cat.image_url ? `background-image:url('${cat.image_url}')` : '';
                    card.innerHTML = `<div class="card-img" style="${bg}">${cat.image_url ? '' : 'Brak tła'}</div><div class="card-info"><h3>${cat.name}</h3></div>`;
                    grid.appendChild(card);
                });
            } else if(currentView === 'category') {
                const { data, error } = await supabase.from('products').select('*').eq('category_id', currentCategoryId);
                const grid = document.getElementById('productsGrid');
                grid.innerHTML = '';
                if(!data || data.length === 0) {
                    grid.innerHTML = '<div class="empty-msg">Brak mebli w tej sekcji. Dodaj je za pomocą panelu edycji.</div>';
                    return;
                }
                data.forEach(prod => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openProduct(prod);
                    let bg = prod.main_image ? `background-image:url('${prod.main_image}')` : '';
                    card.innerHTML = `<div class="card-img" style="${bg}">${prod.main_image ? '' : 'Podgląd'}</div><div class="card-info"><h3>${prod.name}</h3><div class="price">${prod.price}</div></div>`;
                    grid.appendChild(card);
                });
            }
        }

        async function addCategory() {
            const name = document.getElementById('catName').value;
            const img = document.getElementById('catImg').value;
            if(!name) return alert('Wpisz nazwę!');
            await supabase.from('categories').insert([{ name: name, image_url: img }]);
            document.getElementById('catName').value = '';
            document.getElementById('catImg').value = '';
            loadData();
        }

        async function addProduct() {
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            const img = document.getElementById('prodImg').value;
            const gallery = document.getElementById('prodGallery').value;
            if(!name || !price) return alert('Wpisz nazwę i cenę!');
            await supabase.from('products').insert([{ category_id: currentCategoryId, name: name, price: price, main_image: img, gallery: gallery }]);
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodImg').value = '';
            document.getElementById('prodGallery').value = '';
            loadData();
        }

        function openCategory(cat) {
            currentCategoryId = cat.id;
            currentView = 'category';
            document.getElementById('mainTitle').innerText = cat.name.toUpperCase();
            switchView();
        }

        function openProduct(prod) {
            currentView = 'product';
            document.getElementById('mainTitle').innerText = prod.name.toUpperCase();
            document.getElementById('detailTitle').innerText = prod.name;
            document.getElementById('detailPrice').innerText = prod.price;
            
            const mainImg = document.getElementById('detailMainImg');
            if(prod.main_image) { mainImg.style.backgroundImage = `url('${prod.main_image}')`; mainImg.innerText = ''; }
            else { mainImg.style.backgroundImage = 'none'; mainImg.innerText = 'Brak zdjęcia głównego'; }

            const thumbs = document.getElementById('detailThumbs');
            thumbs.innerHTML = '';
            if(prod.gallery) {
                const list = prod.gallery.split(',').map(s => s.trim());
                list.forEach(url => {
                    const t = document.createElement('div');
                    t.className = 'thumb';
                    t.style.backgroundImage = `url('${url}')`;
                    t.onclick = () => mainImg.style.backgroundImage = `url('${url}')`;
                    thumbs.appendChild(t);
                });
            }
            switchView();
        }

        function switchView() {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('backBtn').style.display = currentView === 'home' ? 'none' : 'block';
            document.getElementById('categoryForm').style.display = currentView === 'home' ? 'block' : 'none';
            document.getElementById('productForm').style.display = currentView === 'category' ? 'block' : 'none';
            
            if(currentView === 'home') document.getElementById('viewHome').classList.add('active');
            if(currentView === 'category') document.getElementById('viewCategory').classList.add('active');
            if(currentView === 'product') document.getElementById('viewProduct').classList.add('active');
            loadData();
        }

        function goBack() {
            if(currentView === 'product') currentView = 'category';
            else if(currentView === 'category') { currentView = 'home'; document.getElementById('mainTitle').innerText = "MIZUMI STYLE"; }
            switchView();
        }

        loadData();
    </script>
</body>
</html>
